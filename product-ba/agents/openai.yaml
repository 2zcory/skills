interface:
  display_name: "Product BA"
  short_description: "Clarify business problems, scope, workflow, and requirements before design or implementation"
  default_prompt: "Use $product-ba to separate the stated request from the underlying business need, clarify actors, workflow, business rules, scope, and success signals, ask only the smallest useful set of high-value questions when needed, choose the lightest fitting BA artifact, and stop once the output is safe enough for handoff."
